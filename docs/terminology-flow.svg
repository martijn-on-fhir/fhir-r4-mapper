<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <style>
      .box { rx: 8; ry: 8; stroke-width: 1.5; }
      .label { font-weight: 600; text-anchor: middle; }
      .sublabel { font-size: 11; fill: #666; text-anchor: middle; }
      .step { font-size: 12; fill: #333; }
      .line { stroke: #555; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 3; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="30" font-size="16" font-weight="700" text-anchor="middle" fill="#222">Terminology Lookup Flow</text>

  <!-- ObservationService -->
  <rect x="30" y="60" width="180" height="60" class="box" fill="#e3f2fd" stroke="#1976d2" />
  <text x="120" y="85" class="label" fill="#1976d2">ObservationService</text>
  <text x="120" y="102" class="sublabel">lookupSnomedSct(code)</text>

  <!-- Arrow to TerminologyService -->
  <line x1="210" y1="90" x2="280" y2="90" class="line" />
  <text x="245" y="82" class="step">1</text>

  <!-- TerminologyService -->
  <rect x="280" y="60" width="180" height="60" class="box" fill="#e8f5e9" stroke="#388e3c" />
  <text x="370" y="85" class="label" fill="#388e3c">TerminologyService</text>
  <text x="370" y="102" class="sublabel">lookup(system, code)</text>

  <!-- Arrow to Redis Cache (check) -->
  <line x1="370" y1="120" x2="370" y2="180" class="line" />
  <text x="380" y="155" class="step">2 check cache</text>

  <!-- Redis -->
  <rect x="290" y="180" width="160" height="55" class="box" fill="#fff3e0" stroke="#f57c00" />
  <text x="370" y="205" class="label" fill="#f57c00">Redis</text>
  <text x="370" y="222" class="sublabel">cache-manager / Keyv</text>

  <!-- Cache hit arrow back -->
  <path d="M 290 200 L 120 200 L 120 120" class="line" stroke="#388e3c" />
  <text x="190" y="193" class="step" fill="#388e3c">3a cache hit → return display</text>

  <!-- Cache miss arrow to BullMQ -->
  <line x1="450" y1="207" x2="540" y2="207" class="line" stroke="#f57c00" />
  <text x="490" y="198" class="step" fill="#f57c00">3b miss</text>

  <!-- BullMQ Queue -->
  <rect x="540" y="180" width="160" height="55" class="box" fill="#fce4ec" stroke="#c62828" />
  <text x="620" y="205" class="label" fill="#c62828">BullMQ Queue</text>
  <text x="620" y="222" class="sublabel">terminology</text>

  <!-- Return fallback -->
  <path d="M 540 235 Q 400 290 120 235 L 120 120" class="line dashed" stroke="#999" />
  <text x="340" y="275" class="step" fill="#999">4 return fallback (async)</text>

  <!-- Arrow to Processor -->
  <line x1="620" y1="235" x2="620" y2="310" class="line" />
  <text x="635" y="278" class="step">5 process job</text>

  <!-- TerminologyProcessor -->
  <rect x="530" y="310" width="180" height="60" class="box" fill="#f3e5f5" stroke="#7b1fa2" />
  <text x="620" y="335" class="label" fill="#7b1fa2">TerminologyProcessor</text>
  <text x="620" y="352" class="sublabel">WorkerHost</text>

  <!-- Arrow to OAuth -->
  <line x1="620" y1="370" x2="620" y2="420" class="line" />
  <text x="635" y="400" class="step">6 get token</text>

  <!-- Keycloak -->
  <rect x="530" y="420" width="180" height="55" class="box" fill="#efebe9" stroke="#795548" />
  <text x="620" y="445" class="label" fill="#795548">Keycloak</text>
  <text x="620" y="462" class="sublabel">OAuth2 password grant</text>

  <!-- Arrow to Terminology Server -->
  <path d="M 710 340 L 810 340" class="line" />
  <text x="755" y="332" class="step">7 fetch</text>

  <!-- Terminology Server -->
  <rect x="730" y="310" width="160" height="60" class="box" fill="#e0f7fa" stroke="#00838f" />
  <text x="810" y="335" class="label" fill="#00838f">Terminology</text>
  <text x="810" y="352" class="sublabel">FHIR $lookup</text>

  <!-- Arrow back to Redis (store) -->
  <path d="M 530 340 L 460 340 L 460 235" class="line" stroke="#f57c00" />
  <text x="468" y="295" class="step" fill="#f57c00">8 cache result</text>
</svg>
