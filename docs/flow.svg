<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 920" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">FHIR R4 Mapper — XML to FHIR Flow</text>

  <!-- 1. XML Input -->
  <rect x="300" y="60" width="300" height="48" rx="24" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="89" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">XML Input (application/xml)</text>

  <line x1="450" y1="108" x2="450" y2="145" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Express Raw Body -->
  <rect x="300" y="148" width="300" height="44" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="175" text-anchor="middle" font-size="13" fill="#475569">Express Raw Body Parser</text>

  <line x1="450" y1="192" x2="450" y2="225" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. XmlJsonMiddleware -->
  <rect x="275" y="228" width="350" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="253" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">XmlJsonMiddleware</text>
  <text x="450" y="272" text-anchor="middle" font-size="11" fill="#3b82f6">XML → JSON (fast-xml-parser)</text>

  <line x1="450" y1="284" x2="450" y2="317" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. FhirResourceMiddleware -->
  <rect x="275" y="320" width="350" height="56" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">FhirResourceMiddleware</text>
  <text x="450" y="364" text-anchor="middle" font-size="11" fill="#3b82f6">zibBundle → RawEntity + resourceAliases</text>

  <line x1="450" y1="376" x2="450" y2="409" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. AppController -->
  <rect x="300" y="412" width="300" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="439" text-anchor="middle" font-size="14" font-weight="600" fill="#4338ca">AppController.convert()</text>

  <line x1="450" y1="456" x2="450" y2="489" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. RegisterService -->
  <rect x="300" y="492" width="300" height="44" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="519" text-anchor="middle" font-size="14" font-weight="600" fill="#4338ca">RegisterService.resolve()</text>

  <line x1="450" y1="536" x2="450" y2="569" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. FHIR Resource Service -->
  <rect x="250" y="572" width="400" height="56" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="597" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">FhirResourceService.init()</text>
  <text x="450" y="616" text-anchor="middle" font-size="11" fill="#22c55e">Observation | Patient | Encounter | ...</text>

  <!-- Terminology branch -->
  <line x1="650" y1="600" x2="720" y2="600" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Terminology Service box -->
  <rect x="723" y="520" width="160" height="160" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="803" y="545" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Terminology</text>
  <text x="803" y="563" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">Service</text>

  <line x1="803" y1="572" x2="803" y2="580" stroke="#eab308" stroke-width="1"/>

  <!-- Redis cache -->
  <rect x="743" y="583" width="120" height="28" rx="4" fill="#fff7ed" stroke="#eab308" stroke-width="1"/>
  <text x="803" y="602" text-anchor="middle" font-size="11" fill="#92400e">Redis Cache</text>

  <!-- BullMQ -->
  <rect x="743" y="618" width="120" height="28" rx="4" fill="#fff7ed" stroke="#eab308" stroke-width="1"/>
  <text x="803" y="637" text-anchor="middle" font-size="11" fill="#92400e">BullMQ Job Queue</text>

  <!-- External APIs -->
  <rect x="743" y="653" width="120" height="20" rx="4" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="803" y="667" text-anchor="middle" font-size="9" fill="#a16207">Nictiz (SNOMED)</text>

  <rect x="743" y="676" width="120" height="20" rx="4" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="803" y="690" text-anchor="middle" font-size="9" fill="#a16207">fhir.loinc.org (LOINC)</text>

  <!-- Utility functions branch -->
  <line x1="250" y1="600" x2="180" y2="600" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="20" y="560" width="157" height="80" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="98" y="585" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce">Utilities</text>
  <text x="98" y="604" text-anchor="middle" font-size="10" fill="#9333ea">formatId()</text>
  <text x="98" y="618" text-anchor="middle" font-size="10" fill="#9333ea">appendSubject()</text>
  <text x="98" y="632" text-anchor="middle" font-size="10" fill="#9333ea">isVitalSign()</text>

  <!-- Arrow down from service -->
  <line x1="450" y1="628" x2="450" y2="669" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8. instanceToPlain -->
  <rect x="300" y="672" width="300" height="44" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="699" text-anchor="middle" font-size="13" fill="#475569">instanceToPlain() — serialisatie</text>

  <line x1="450" y1="716" x2="450" y2="749" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 9. FHIR JSON Output -->
  <rect x="300" y="752" width="300" height="48" rx="24" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="781" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">FHIR R4 JSON Response</text>

  <!-- Error path -->
  <line x1="600" y1="439" x2="700" y2="439" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="700" y1="439" x2="700" y2="770" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <rect x="630" y="773" width="200" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="800" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">OperationOutcome</text>

  <text x="715" y="432" font-size="10" fill="#ef4444">error</text>

  <!-- Legend -->
  <rect x="20" y="840" width="860" height="65" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="862" font-size="11" font-weight="600" fill="#64748b">Legenda:</text>
  <rect x="40" y="872" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="884" font-size="10" fill="#475569">Middleware</text>
  <rect x="150" y="872" width="14" height="14" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="170" y="884" font-size="10" fill="#475569">Controller / Routing</text>
  <rect x="310" y="872" width="14" height="14" rx="3" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="330" y="884" font-size="10" fill="#475569">FHIR Mapping</text>
  <rect x="440" y="872" width="14" height="14" rx="3" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="460" y="884" font-size="10" fill="#475569">Terminology</text>
  <rect x="560" y="872" width="14" height="14" rx="3" fill="#f3e8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="580" y="884" font-size="10" fill="#475569">Utilities</text>
  <rect x="660" y="872" width="14" height="14" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="680" y="884" font-size="10" fill="#475569">Error handling</text>
</svg>
